<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>命定之书 · 你的人生小说</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { 
            background: #0b0c14; 
            color: #e5e7eb; 
            font-family: 'Inter', sans-serif; 
            padding: 20px; 
        }
        .container { 
            max-width: 1000px; 
            margin: 0 auto; 
        }
        .header { 
            text-align: center; 
            margin-bottom: 40px; 
        }
        .header h1 { 
            font-size: 48px; 
            background: linear-gradient(135deg, #9d7bf5, #6ec8e0, #ff9f4b); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .card { 
            background: rgba(20, 24, 39, 0.8); 
            border-radius: 32px; 
            padding: 32px; 
            border: 1px solid rgba(255,255,255,0.05); 
        }
        .input-item { 
            margin-bottom: 20px; 
        }
        .input-item label { 
            color: #9ca3af; 
            font-size: 12px; 
            text-transform: uppercase; 
            display: block; 
            margin-bottom: 8px; 
        }
        /* 修复下拉选框文字颜色问题 */
        .input-item select, 
        .input-item input {
            width: 100%; 
            background: #1e1e2e;  /* 更深的背景色 */
            border: 1px solid #3a3a4e; 
            border-radius: 16px; 
            padding: 14px; 
            color: #ffffff !important;  /* 强制白色文字 */
            font-size: 16px;
            appearance: none;  /* 移除默认样式 */
            -webkit-appearance: none;
        }
        .input-item select option {
            background: #1e1e2e;
            color: #ffffff;
            padding: 10px;
        }
        .datetime-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 8px; 
        }
        .address-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px; 
            margin-top: 8px; 
        }
        .generate-btn { 
            width: 100%; 
            background: linear-gradient(135deg, #9d7bf5, #6ec8e0); 
            border: none; 
            border-radius: 60px; 
            padding: 16px; 
            color: white; 
            font-size: 18px; 
            font-weight: 600; 
            cursor: pointer; 
            margin-top: 20px; 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        .generate-btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 20px rgba(157,123,245,0.3); 
        }
        .footer { 
            margin-top: 30px; 
            text-align: center; 
            color: #4b5563; 
        }
        .api-note { 
            background: rgba(157,123,245,0.1); 
            border: 1px solid rgba(157,123,245,0.2); 
            border-radius: 60px; 
            padding: 10px 20px; 
            margin-bottom: 24px; 
            color: #9d7bf5; 
            font-size: 13px; 
            display: inline-block; 
        }
        /* 确保所有下拉框文字可见 */
        select {
            color: white !important;
            background-color: #1e1e2e !important;
        }
        select option {
            color: white !important;
            background-color: #1e1e2e !important;
        }
        /* 修复禁用状态的下拉框 */
        select:disabled {
            opacity: 0.6;
            color: #9ca3af !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>人生小说</h1>
            <p>八字 · 哲学 · 专属故事</p>
        </div>
        <div class="card">
            <div class="api-note">⚡ 测试密钥 · 正式版隐藏</div>
            
            <div class="input-item">
                <label>🔑 API密钥</label>
                <input type="text" id="apiKey" placeholder="sk-xxxxxxxxxxxxxx" value="">
            </div>
            
            <div class="input-item">
                <label>👤 你的姓名</label>
                <input type="text" id="userName" placeholder="主角名字" value="陈长生">
            </div>
            
            <div class="input-item">
                <label>📅 出生日期</label>
                <div class="datetime-grid">
                    <select id="year"><option value="">年</option></select>
                    <select id="month"><option value="">月</option></select>
                    <select id="day"><option value="">日</option></select>
                    <select id="hour"><option value="">时</option></select>
                    <select id="minute"><option value="">分</option></select>
                </div>
            </div>
            
            <div class="input-item">
                <label>⚥ 性别</label>
                <select id="gender">\
                    <option value="女">女</option>
                    <option value="男">男</option>
                </select>
            </div>
            
            <div class="input-item">
                <label>📍 出生地（省市区）</label>
                <div class="address-grid">
                    <select id="province"><option value="">请选择省份</option></select>
                    <select id="city" disabled><option value="">请先选择省份</option></select>
                    <select id="district" disabled><option value="">请先选择城市</option></select>
                </div>
            </div>
            
            <button class="generate-btn" id="generateBtn">生成命定之书 →</button>
        </div>
        <div class="footer">⏳ 真太阳时校准 · lunar.js 排盘 · AI 文学生成</div>
    </div>

    <script src="city-data.js"></script>
    <script src="lunar.js"></script>
    <script src="index.js"></script>
</body>
</html>
